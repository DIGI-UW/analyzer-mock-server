name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      parent_ref:
        description: 'Parent repo ref for analyzer profiles (branch, tag, or SHA)'
        default: 'develop'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout analyzer profiles from parent repo
        uses: actions/checkout@v4
        with:
          repository: DIGI-UW/OpenELIS-Global-2
          sparse-checkout: projects/analyzer-profiles
          path: parent
          # Default: develop (latest merged profiles).
          # Override via workflow_dispatch input for linked PRs with profile changes.
          ref: ${{ inputs.parent_ref || 'develop' }}

      - name: Set profiles path for tests
        run: echo "ANALYZER_PROFILES_DIR=${{ github.workspace }}/parent/projects/analyzer-profiles/hl7" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate JSON templates
        run: |
          python -c "
          import json
          import glob
          for f in glob.glob('templates/*.json'):
              print(f'Validating {f}...')
              json.load(open(f))
          print('All templates valid')
          "

      - name: Run unit tests
        run: |
          python -m pytest test_hl7.py test_protocols.py -v --tb=short

      - name: Validate Python syntax
        run: |
          python -m py_compile server.py template_loader.py profile_adapter.py
          python -m py_compile protocols/*.py
          python -m py_compile generate_file.py
          echo "All Python files have valid syntax"
